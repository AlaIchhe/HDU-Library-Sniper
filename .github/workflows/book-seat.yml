# GitHub Actions 每日抢座调度
#
# ⚠️ 跨境延迟注意：Runner 节点在日本/美国/欧洲，实际延迟 30～90 秒
#    （GitHub 官方调度平均排队 30-90 秒 + 跨境网络抖动）。
#    仅供不在意延迟的场景使用（备链路）。主力用 scripts/AutoSchedule.ps1 + 任务计划。
#
# ⚠️ 凭据安全：学号 + 数字杭电密码 = 账户所有权，一律通过 Settings → Secrets 注入
#    （HDU_STUDENT_ID / HDU_PASSWORD），绝对不要写进本文件、仓库代码、PR diff 或 commit。
#    CI 用环境变量传凭据，不落盘；与本地 data/credentials.yaml 等价。

name: HDU Library Seat Booking

on:
  schedule:
    # 每天 20:00 触发（UTC 12:00 = CST 20:00）
    # GitHub 官方调度平均有 30-90 秒排队延迟，放号场景下不可控
    - cron: '0 12 * * *'

  # 手动触发调试用：Actions 页 → Run workflow
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # headless 登录需要 chromium 浏览器二进制 + 系统库
      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium

      # ---- 注入方案/配置（学号+密码走环境变量，不落盘）----
      # config/plans.yaml 已被 .gitignore 排除，Runner 上原本为空，这里从 Secret 写入。
      - name: Inject plans/config secrets
        env:
          HDU_PLANS_YAML:  ${{ secrets.HDU_PLANS_YAML }}
          HDU_CONFIG_YAML: ${{ secrets.HDU_CONFIG_YAML }}
          HDU_STUDENT_ID:  ${{ secrets.HDU_STUDENT_ID }}
        run: |
          set -e
          mkdir -m 0700 -p data logs
          if [ -z "$HDU_STUDENT_ID" ]; then
            echo "::error::Secret HDU_STUDENT_ID 未设置或为空，请先在 Settings → Secrets 添加 HDU_STUDENT_ID 与 HDU_PASSWORD。"
            exit 1
          fi
          if [ -n "$HDU_PLANS_YAML" ]; then
            printf '%s' "$HDU_PLANS_YAML" > config/plans.yaml
            chmod 600 config/plans.yaml
          fi
          if [ -n "$HDU_CONFIG_YAML" ]; then
            printf '%s' "$HDU_CONFIG_YAML" > config/config.yaml
          fi
          echo "✔ secrets ready (plans/config injected; credentials via env)"

      # ---- 核心抢座：学号+密码 headless 自动登录后抢座（和本地同一条命令）----
      - name: Run booking
        id: booking
        env:
          HDU_STUDENT_ID: ${{ secrets.HDU_STUDENT_ID }}
          HDU_PASSWORD:   ${{ secrets.HDU_PASSWORD }}
        run: python main.py --run-now
        continue-on-error: true

      - name: Push notification
        if: always()
        shell: bash
        run: |
          # secrets 在 step if 中部分 parser 版本不支持（报 "Unrecognized named-value: 'secrets'"），
          # 因此把 WEBHOOK_URL 的空判断挪到 shell 里做，行为和原来一致。
          WEBHOOK_URL='${{ secrets.WEBHOOK_URL }}'
          if [ -z "$WEBHOOK_URL" ]; then
            echo "⚠ WEBHOOK_URL 未设置，跳过通知"
            exit 0
          fi
          outcome='${{ steps.booking.outcome }}'
          if [ "$outcome" = "success" ]; then
            text="[✅ HDU Sniper] 抢座任务成功"
          else
            text="[❌ HDU Sniper] 抢座任务失败 (run ${{ github.run_id }})"
          fi
          curl -fsSL -X POST "$WEBHOOK_URL" \
            --data-urlencode "text=$text" \
            --data-urlencode "desp=时间: $(date -u +%F %T UTC)%0A结果: $outcome"

      - name: Clear cache files
        if: always()
        run: |
          rm -f data/session.cache config/plans.yaml
          # 防止 runner /temp 残留敏感文件
          echo "✔ cache cleared"
