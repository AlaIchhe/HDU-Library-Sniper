x-runtime: &runtime
  HDU_SNIPER_HOME: /var/lib/hdu-sniper
  HDU_STUDENT_ID: ${HDU_STUDENT_ID:-}
  HDU_PASSWORD: ${HDU_PASSWORD:-}
  HDU_STUDENT_ID_FILE: ${HDU_STUDENT_ID_FILE:-}
  HDU_PASSWORD_FILE: ${HDU_PASSWORD_FILE:-}
  HDU_WECHAT_WEBHOOK: ${HDU_WECHAT_WEBHOOK:-}

services:
  hdu-sniper-gui:
    build:
      context: .
      dockerfile: Dockerfile
    image: hdu-library-sniper:latest
    container_name: hdu-sniper-gui
    environment:
      <<: *runtime
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./deploy/config:/var/lib/hdu-sniper/config:rw
      - sniper-data:/var/lib/hdu-sniper/data
      - sniper-state:/var/lib/hdu-sniper/state
    network_mode: host
    profiles: [gui]
    command: gui

  hdu-sniper-run:
    build:
      context: .
      dockerfile: Dockerfile
    image: hdu-library-sniper:latest
    container_name: hdu-sniper-run
    environment: *runtime
    volumes:
      - ./deploy/config:/var/lib/hdu-sniper/config:ro
      - sniper-data:/var/lib/hdu-sniper/data
      - sniper-state:/var/lib/hdu-sniper/state
    profiles: [run]
    command: run-now

  hdu-sniper-scheduled:
    build:
      context: .
      dockerfile: Dockerfile
    image: hdu-library-sniper:latest
    container_name: hdu-sniper-scheduled
    environment:
      <<: *runtime
      SCHEDULE: ${SCHEDULE:-0 20 * * *}
    volumes:
      - ./deploy/config:/var/lib/hdu-sniper/config:ro
      - sniper-data:/var/lib/hdu-sniper/data
      - sniper-state:/var/lib/hdu-sniper/state
    restart: unless-stopped
    profiles: [scheduled]
    command: scheduled

volumes:
  sniper-data:
  sniper-state:
