# HDU 图书馆抢座工具配置

booking:
  max_trials: 5      # 每个方案最大重试次数（不含等待预约窗口开放的轮询）
  retry_delay: 1.0    # 基础重试延迟（秒），实际按指数退避 + 抖动计算
  dry_run: false      # 预览模式：构造请求但不真正提交预约
  window_wait_seconds: 30.0    # 预约窗口未开放时最多等待秒数（用于定时任务卡在整点、服务器晚几秒开闸的场景）
  window_poll_interval: 1.0    # 等待预约窗口开放期间的轮询间隔（秒）

paths:
  session_cache: data/session.cache   # Cookie 缓存文件（登录一次后自动复用）
  plans_file: data/plans.yaml          # 预约方案存储文件
  log_file: logs/booking.log           # 预约结果日志文件

notification:
  wechat_webhook: ""   # 可选：Server酱 / PushPlus 等 webhook 地址，留空则不推送
